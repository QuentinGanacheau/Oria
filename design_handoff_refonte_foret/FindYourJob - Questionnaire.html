<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FindYourJob — Questionnaire</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
:root{
  --radius:18px;
  --maxw:760px;
  --serif:"Instrument Serif",Georgia,serif;
  --sans:"Space Grotesk",system-ui,sans-serif;
  --surface:#FFFFFF;
  --paper:#F0F2EB;
  --surface-2:#F7F8FA;
  --ink:#15171D;
  --ink-soft:#3d424d;
  --muted:#6f7682;
  --line:#e4e7ec;
  --line-strong:#d3d9e0;
  --ok:#1E7A4D;
  --panel:#17161B;
  --on-panel:#F4F2ED;
  --accent:#1E7A4D;
  --accent-soft:#dcefe3;
  --accent-ink:#155c3a;
}
html[data-mode="dark"]{
  --paper:#0F1115;--surface:#181b21;--surface-2:#1e222a;
  --ink:#eef0f3;--ink-soft:#ccd2da;--muted:#8b93a0;
  --line:#272c35;--line-strong:#39404b;
  --panel:#0c0e12;--on-panel:#eef0f3;
  --accent-soft:color-mix(in srgb,var(--accent) 16%,var(--surface));
  --accent-ink:color-mix(in srgb,var(--accent) 58%,#ffffff);
  --ok:color-mix(in srgb,var(--accent) 55%,#ffffff);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:var(--paper);color:var(--ink);font-family:var(--sans);
  font-size:17px;line-height:1.6;-webkit-font-smoothing:antialiased;
  min-height:100vh;display:flex;flex-direction:column;
}
a{color:inherit;text-decoration:none}
svg{display:block}
.serif{font-family:var(--serif);font-weight:400;letter-spacing:-.01em;line-height:1.06}
.muted{color:var(--muted)}

/* Top bar */
.topbar{position:sticky;top:0;z-index:30;background:color-mix(in srgb,var(--paper) 84%,transparent);backdrop-filter:blur(12px)}
.tb-inner{max-width:var(--maxw);margin:0 auto;padding:22px 24px 0}
.tb-row{display:flex;align-items:center;justify-content:space-between;gap:16px}
.home{display:inline-flex;align-items:center;gap:8px;font-size:15px;font-weight:500;color:var(--accent-ink)}
.home:hover{opacity:.75}
.tb-right{display:flex;align-items:center;gap:14px}
.counter{font-size:14px;color:var(--muted);font-variant-numeric:tabular-nums}
.counter b{color:var(--ink);font-weight:600}
.tgl{width:38px;height:38px;border-radius:999px;border:1px solid var(--line-strong);background:var(--surface);display:grid;place-items:center;cursor:pointer;color:var(--ink-soft);flex:none}
.tgl:hover{border-color:var(--accent);color:var(--accent-ink)}
.tgl svg{width:17px;height:17px;stroke:currentColor;stroke-width:1.7;fill:none}

/* Progress */
.progress{max-width:var(--maxw);margin:18px auto 0;padding:0 24px}
.ptrack{height:6px;border-radius:999px;background:var(--line);overflow:hidden}
.pfill{height:100%;border-radius:999px;background:var(--accent);width:0;transition:width .45s cubic-bezier(.4,0,.2,1)}
.pmeta{display:flex;justify-content:flex-end;margin-top:8px;font-size:13px;color:var(--muted)}

/* Back link */
.backwrap{max-width:var(--maxw);margin:18px auto 0;padding:0 24px;min-height:24px}
.back{display:inline-flex;align-items:center;gap:7px;font-size:14px;color:var(--muted);cursor:pointer}
.back:hover{color:var(--accent-ink)}
.back.hidden{visibility:hidden;pointer-events:none}

/* Card */
.stage{flex:1;display:flex;align-items:flex-start;justify-content:center;padding:22px 24px 80px}
.card{width:100%;max-width:var(--maxw);background:var(--surface);border:1px solid var(--line);border-radius:24px;box-shadow:0 30px 60px -38px rgba(20,40,25,.28);padding:46px 46px 40px}
.q-eyebrow{font-size:12px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--accent-ink);margin-bottom:16px}
.q-title{font-size:clamp(26px,3.4vw,38px)}
.q-sub{color:var(--muted);font-size:16px;margin-top:12px;max-width:44ch}
@media(max-width:600px){.card{padding:30px 22px 28px}}

/* fade transition */
.qbody{margin-top:30px;animation:fade .35s ease both}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* Single choice options */
.opts{display:flex;flex-direction:column;gap:12px}
.opt{display:flex;align-items:center;gap:16px;width:100%;text-align:left;background:var(--surface-2);border:1.5px solid var(--line);border-radius:16px;padding:20px 22px;cursor:pointer;font-family:var(--sans);font-size:16.5px;color:var(--ink);transition:border-color .18s,background .18s,transform .12s}
.opt:hover{border-color:color-mix(in srgb,var(--accent) 45%,var(--line));background:var(--surface)}
.opt:active{transform:scale(.992)}
.opt .mark{flex:none;width:24px;height:24px;border-radius:50%;border:2px solid var(--line-strong);display:grid;place-items:center;transition:border-color .18s,background .18s}
.opt .mark svg{width:13px;height:13px;stroke:#fff;stroke-width:2.6;fill:none;opacity:0;transform:scale(.6);transition:.18s}
.opt.sel{border-color:var(--accent);background:var(--accent-soft)}
.opt.sel .mark{border-color:var(--accent);background:var(--accent)}
.opt.sel .mark svg{opacity:1;transform:none}
.opt .lbl{flex:1}

/* Chips */
.chips{display:flex;flex-wrap:wrap;gap:10px}
.chip{display:inline-flex;align-items:center;gap:8px;border:1.5px solid var(--line-strong);background:var(--surface);border-radius:999px;padding:10px 18px;font-family:var(--sans);font-size:15px;color:var(--ink-soft);cursor:pointer;transition:.16s}
.chip:hover{border-color:var(--accent);color:var(--accent-ink)}
.chip.sel{background:var(--accent);border-color:var(--accent);color:#fff}
.chip .x{width:15px;height:15px;stroke:currentColor;stroke-width:2.2;fill:none;opacity:0;width:0;transition:.16s}
.chip.sel .x{opacity:1;width:15px}

/* Textarea */
.field{margin-top:22px}
textarea{width:100%;min-height:130px;resize:vertical;font-family:var(--sans);font-size:16px;line-height:1.6;color:var(--ink);background:var(--surface-2);border:1.5px solid var(--line);border-radius:16px;padding:16px 18px;transition:border-color .18s,background .18s}
textarea::placeholder{color:var(--muted)}
textarea:focus{outline:none;border-color:var(--accent);background:var(--surface)}

/* Scale / slider */
.scale{margin-top:8px}
.scale-ends{display:flex;justify-content:space-between;font-size:14px;color:var(--muted);margin-bottom:18px;gap:20px}
.scale-ends b{display:block;color:var(--ink);font-weight:600;font-size:15px;margin-bottom:2px}
.scale-ends .l{text-align:left;max-width:18ch}
.scale-ends .r{text-align:right;max-width:18ch}
.dots{display:flex;justify-content:space-between;gap:10px}
.dot{flex:1;height:54px;border:1.5px solid var(--line);background:var(--surface-2);border-radius:14px;cursor:pointer;display:grid;place-items:center;font-family:var(--serif);font-size:22px;color:var(--muted);transition:.16s}
.dot:hover{border-color:color-mix(in srgb,var(--accent) 45%,var(--line));color:var(--accent-ink)}
.dot.sel{background:var(--accent);border-color:var(--accent);color:#fff}

/* Footer actions */
.actions{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-top:34px}
.hint{font-size:13.5px;color:var(--muted)}
.btn{display:inline-flex;align-items:center;gap:.5em;font-family:var(--sans);font-weight:600;font-size:15px;border-radius:999px;padding:14px 26px;cursor:pointer;border:1px solid transparent;transition:transform .15s,background .2s,box-shadow .2s,opacity .2s}
.btn:active{transform:translateY(1px)}
.btn-primary{background:var(--ink);color:var(--paper)}
.btn-primary:hover{background:var(--accent);color:#fff}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;background:var(--line-strong);color:var(--surface)}
.btn-primary:disabled:hover{background:var(--line-strong)}
.btn .arr{transition:transform .2s}
.btn:not(:disabled):hover .arr{transform:translateX(3px)}

/* Done screen */
.done{text-align:center;padding:30px 0 10px}
.done .ring{width:96px;height:96px;border-radius:50%;background:var(--accent-soft);display:grid;place-items:center;margin:0 auto 26px}
.done .ring svg{width:44px;height:44px;stroke:var(--accent);stroke-width:2.2;fill:none}
.done h2{font-size:clamp(30px,4vw,44px)}
.done p{color:var(--ink-soft);font-size:17px;margin:16px auto 0;max-width:42ch}
.done .btn{margin-top:30px}
</style>
</head>
<body>

<div class="topbar">
  <div class="tb-inner">
    <div class="tb-row">
      <a href="FindYourJob - Foret.html" class="home"><span style="font-size:18px;line-height:1">←</span> Accueil</a>
      <div class="tb-right">
        <button class="tgl" id="themeBtn" aria-label="Changer de thème"></button>
        <span class="counter" id="counter"></span>
      </div>
    </div>
  </div>
  <div class="progress">
    <div class="ptrack"><div class="pfill" id="pfill"></div></div>
    <div class="pmeta" id="pmeta"></div>
  </div>
</div>

<div class="backwrap">
  <span class="back hidden" id="backBtn"><span style="font-size:16px;line-height:1">←</span> Précédent</span>
</div>

<div class="stage">
  <div class="card" id="card"></div>
</div>

<script>
(function(){
  var html=document.documentElement;

  /* ---- theme ---- */
  var btn=document.getElementById('themeBtn');
  var moon='<svg viewBox="0 0 24 24"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg>';
  var sun='<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>';
  function applyMode(m){ html.setAttribute('data-mode',m); btn.innerHTML=m==='dark'?sun:moon; try{localStorage.setItem('fyj-mode',m);}catch(e){} }
  var savedMode='light'; try{ savedMode=localStorage.getItem('fyj-mode')||'light'; }catch(e){}
  applyMode(savedMode);
  btn.addEventListener('click',function(){ applyMode(html.getAttribute('data-mode')==='dark'?'light':'dark'); });

  /* ---- data ---- */
  var QUESTIONS=[
    {
      type:'single', eyebrow:'Pour commencer',
      title:'Quelle est ta situation actuelle ?',
      options:[
        "En poste — j'explore de nouvelles pistes",
        "En études longues (Bac+3 et plus)",
        "Au lycée ou en études courtes (CAP, BTS…)",
        "Je veux changer de métier, je ne sais pas encore vers quoi"
      ]
    },
    {
      type:'multi', eyebrow:'Ton parcours',
      title:"Ton métier ou secteur actuel, c'est quoi ?",
      sub:"Pas ton titre officiel — décris ce que tu fais vraiment, jour après jour.",
      options:[
        "Administratif / back-office","Artisanat / technique","Commercial / vente",
        "Conseil / consulting","Enseignement / formation","Finance & comptabilité",
        "Informatique / tech","Logistique / transport","Management / gestion de projet",
        "Marketing & communication","Ressources humaines","Santé / médical"
      ],
      textarea:"Décris ce que tu fais vraiment au quotidien, pas juste ton titre…"
    },
    {
      type:'single', eyebrow:'Ce qui compte',
      title:"Au travail, qu'est-ce qui te motive le plus ?",
      options:[
        "Résoudre des problèmes concrets",
        "Créer et imaginer des choses nouvelles",
        "Aider et accompagner les autres",
        "Organiser, structurer, faire avancer"
      ]
    },
    {
      type:'scale', eyebrow:'Ton équilibre',
      title:"Tu te sens plus à l'aise avec…",
      sub:"Place-toi sur l'échelle, il n'y a pas de bonne réponse.",
      left:{t:"Beaucoup d'autonomie", s:"je décide de mon organisation"},
      right:{t:"Un cadre clair", s:"je préfère des consignes précises"}
    },
    {
      type:'text', eyebrow:'À toi la parole',
      title:"Y a-t-il quelque chose que tu refuses absolument dans un futur métier ?",
      sub:"Contraintes, environnement, valeurs… écris-le librement. L'IA en tiendra compte.",
      textarea:"Par exemple : pas de travail le week-end, pas de pression chiffrée, besoin de sens…",
      optional:true
    }
  ];

  /* ---- state ---- */
  var answers={}, idx=0;
  try{
    var st=JSON.parse(localStorage.getItem('fyj-quiz')||'{}');
    if(st&&typeof st.idx==='number'){ idx=Math.min(st.idx,QUESTIONS.length); answers=st.answers||{}; }
  }catch(e){}
  function persist(){ try{localStorage.setItem('fyj-quiz',JSON.stringify({idx:idx,answers:answers}));}catch(e){} }

  var card=document.getElementById('card');
  var counter=document.getElementById('counter');
  var pfill=document.getElementById('pfill');
  var pmeta=document.getElementById('pmeta');
  var backBtn=document.getElementById('backBtn');

  backBtn.addEventListener('click',function(){ if(idx>0){ idx--; persist(); render(); } });

  function setProgress(){
    var done=Math.min(idx,QUESTIONS.length);
    var pct=Math.round(done/QUESTIONS.length*100);
    pfill.style.width=pct+'%';
    if(idx>=QUESTIONS.length){ counter.innerHTML=''; pmeta.textContent='Terminé'; }
    else{ counter.innerHTML='<b>'+(idx+1)+'</b> / '+QUESTIONS.length; pmeta.textContent=pct+'% complété'; }
    backBtn.classList.toggle('hidden', idx===0 || idx>=QUESTIONS.length);
  }

  function go(){ idx++; persist(); render(); }

  function render(){
    setProgress();
    if(idx>=QUESTIONS.length){ renderDone(); return; }
    var q=QUESTIONS[idx];
    var h='<div class="qbody">';
    h+='<div class="q-eyebrow">'+q.eyebrow+'</div>';
    h+='<h1 class="q-title serif">'+q.title+'</h1>';
    if(q.sub) h+='<p class="q-sub">'+q.sub+'</p>';

    if(q.type==='single'){
      h+='<div class="opts" style="margin-top:30px">';
      q.options.forEach(function(o,i){
        var sel=answers[idx]===i?' sel':'';
        h+='<button class="opt'+sel+'" data-i="'+i+'"><span class="mark"><svg viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg></span><span class="lbl">'+o+'</span></button>';
      });
      h+='</div>';
    }
    else if(q.type==='multi'){
      var selected=answers[idx]&&answers[idx].chips?answers[idx].chips:[];
      h+='<div class="chips" style="margin-top:26px">';
      q.options.forEach(function(o,i){
        var sel=selected.indexOf(i)>=0?' sel':'';
        h+='<button class="chip'+sel+'" data-i="'+i+'">'+o+'<svg class="x" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg></button>';
      });
      h+='</div>';
      var tv=(answers[idx]&&answers[idx].text)||'';
      h+='<div class="field"><textarea placeholder="'+q.textarea+'">'+tv+'</textarea></div>';
      h+=actions(false);
    }
    else if(q.type==='scale'){
      h+='<div class="scale" style="margin-top:30px">';
      h+='<div class="scale-ends"><div class="l"><b>'+q.left.t+'</b>'+q.left.s+'</div><div class="r"><b>'+q.right.t+'</b>'+q.right.s+'</div></div>';
      h+='<div class="dots">';
      for(var d=1;d<=5;d++){ var sel=answers[idx]===d?' sel':''; h+='<button class="dot'+sel+'" data-d="'+d+'">'+d+'</button>'; }
      h+='</div></div>';
      h+=actions(answers[idx]==null);
    }
    else if(q.type==='text'){
      var tv2=(answers[idx]&&answers[idx].text)||'';
      h+='<div class="field" style="margin-top:30px"><textarea placeholder="'+q.textarea+'">'+tv2+'</textarea></div>';
      h+=actions(false,q.optional);
    }
    h+='</div>';
    card.innerHTML=h;
    bind(q);
  }

  function actions(disabled,optional){
    var hint=optional?'<span class="hint">Facultatif — tu peux passer.</span>':'<span></span>';
    return '<div class="actions">'+hint+'<button class="btn btn-primary" id="next"'+(disabled?' disabled':'')+'>Continuer <span class="arr">→</span></button></div>';
  }

  function bind(q){
    if(q.type==='single'){
      card.querySelectorAll('.opt').forEach(function(el){
        el.addEventListener('click',function(){
          answers[idx]=+el.dataset.i;
          card.querySelectorAll('.opt').forEach(function(o){o.classList.remove('sel');});
          el.classList.add('sel');
          persist();
          setTimeout(go,260); /* auto-advance */
        });
      });
    }
    else if(q.type==='multi'){
      var nextBtn=card.querySelector('#next');
      var ta=card.querySelector('textarea');
      function syncMulti(){
        if(!answers[idx]) answers[idx]={chips:[],text:''};
        answers[idx].text=ta.value;
        var any=answers[idx].chips.length>0 || ta.value.trim().length>0;
        nextBtn.disabled=!any; persist();
      }
      card.querySelectorAll('.chip').forEach(function(el){
        el.addEventListener('click',function(){
          if(!answers[idx]) answers[idx]={chips:[],text:ta.value};
          var i=+el.dataset.i, arr=answers[idx].chips, p=arr.indexOf(i);
          if(p>=0){arr.splice(p,1);el.classList.remove('sel');} else {arr.push(i);el.classList.add('sel');}
          syncMulti();
        });
      });
      ta.addEventListener('input',syncMulti);
      nextBtn.addEventListener('click',go);
      syncMulti();
    }
    else if(q.type==='scale'){
      var nb=card.querySelector('#next');
      card.querySelectorAll('.dot').forEach(function(el){
        el.addEventListener('click',function(){
          answers[idx]=+el.dataset.d;
          card.querySelectorAll('.dot').forEach(function(o){o.classList.remove('sel');});
          el.classList.add('sel'); nb.disabled=false; persist();
        });
      });
    }
    else if(q.type==='text'){
      var nb2=card.querySelector('#next');
      var ta2=card.querySelector('textarea');
      ta2.addEventListener('input',function(){
        answers[idx]={text:ta2.value};
        nb2.disabled=q.optional?false:(ta2.value.trim().length===0);
        persist();
      });
      nb2.addEventListener('click',go);
    }
  }

  function renderDone(){
    backBtn.classList.add('hidden');
    card.innerHTML=
      '<div class="qbody done">'+
        '<div class="ring"><svg viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg></div>'+
        '<h2 class="serif">Parfait, c\'est tout pour nous.</h2>'+
        '<p>L\'IA analyse tes réponses et croise ton profil avec une vingtaine de métiers. Ton classement personnalisé arrive dans quelques secondes.</p>'+
        '<button class="btn btn-primary" id="see">Voir mes résultats <span class="arr">→</span></button>'+
        '<div style="margin-top:18px"><span class="back" id="restart" style="justify-content:center">↺ Recommencer le test</span></div>'+
      '</div>';
    card.querySelector('#see').addEventListener('click',function(){ window.location.href='FindYourJob - Resultats.html'; });
    card.querySelector('#restart').addEventListener('click',function(){ idx=0; answers={}; persist(); render(); });
  }

  render();
})();
</script>
</body>
</html>
