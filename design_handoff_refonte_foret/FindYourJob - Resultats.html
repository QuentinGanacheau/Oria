<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FindYourJob — Tes pistes métiers</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
:root{
  --serif:"Instrument Serif",Georgia,serif;
  --sans:"Space Grotesk",system-ui,sans-serif;
  --surface:#FFFFFF;
  --paper:#F0F2EB;
  --surface-2:#F7F8FA;
  --ink:#15171D;
  --ink-soft:#3d424d;
  --muted:#6f7682;
  --line:#e4e7ec;
  --line-strong:#d3d9e0;
  --ok:#1E7A4D;
  --no:#c0473b;
  --accent:#1E7A4D;
  --accent-soft:#dcefe3;
  --accent-ink:#155c3a;
}
html[data-mode="dark"]{
  --paper:#0F1115;--surface:#181b21;--surface-2:#1e222a;
  --ink:#eef0f3;--ink-soft:#ccd2da;--muted:#8b93a0;
  --line:#272c35;--line-strong:#39404b;
  --accent-soft:color-mix(in srgb,var(--accent) 18%,var(--surface));
  --accent-ink:color-mix(in srgb,var(--accent) 60%,#ffffff);
  --ok:color-mix(in srgb,var(--accent) 55%,#ffffff);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--paper);color:var(--ink);font-family:var(--sans);
  line-height:1.55;-webkit-font-smoothing:antialiased;
  min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden;
}
svg{display:block}
.serif{font-family:var(--serif);font-weight:400;letter-spacing:-.01em;line-height:1.04}
a{color:inherit;text-decoration:none}

/* Top bar */
.topbar{padding:22px 24px 0;max-width:560px;margin:0 auto;width:100%}
.tb-row{display:flex;align-items:center;justify-content:space-between}
.home{display:inline-flex;align-items:center;gap:8px;font-size:14px;font-weight:500;color:var(--accent-ink)}
.home:hover{opacity:.75}
.tgl{width:38px;height:38px;border-radius:999px;border:1px solid var(--line-strong);background:var(--surface);display:grid;place-items:center;cursor:pointer;color:var(--ink-soft);flex:none}
.tgl:hover{border-color:var(--accent);color:var(--accent-ink)}
.tgl svg{width:17px;height:17px;stroke:currentColor;stroke-width:1.7;fill:none}

/* Heading */
.head{text-align:center;padding:26px 24px 18px}
.head h1{font-size:clamp(30px,5vw,40px)}
.head p{color:var(--muted);font-size:15.5px;margin-top:8px}

/* Stage */
.stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:6px 20px 40px}
.deck{position:relative;width:100%;max-width:440px;height:600px;margin:0 auto}

/* Card */
.cardx{position:absolute;inset:0;background:var(--surface);border:1px solid var(--line);border-radius:24px;
  box-shadow:0 30px 60px -32px rgba(20,40,25,.34);overflow:hidden;display:flex;flex-direction:column;
  will-change:transform;touch-action:none;user-select:none}
.cardx .band{background:linear-gradient(110deg,var(--accent-ink),var(--accent));color:#fff;padding:18px 24px;display:flex;align-items:center;justify-content:space-between;flex:none}
.band .pn{font-size:13px;font-weight:600;letter-spacing:.04em;opacity:.9}
.band .pct{font-size:13px;font-weight:600;background:rgba(255,255,255,.2);padding:6px 13px;border-radius:999px;backdrop-filter:blur(4px)}
.cbody{padding:24px 26px 22px;overflow-y:auto;flex:1;scrollbar-width:none}
.cbody::-webkit-scrollbar{display:none}
.cbody h2{font-size:30px;letter-spacing:-.015em}
.tagline{color:var(--ink-soft);font-size:16px;margin-top:8px}
.desc{color:var(--muted);font-size:14.5px;margin-top:16px}
.sec{margin-top:20px}
.sec .lab{font-size:11px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--accent-ink)}
.sec .why{color:var(--ink-soft);font-size:14.5px;margin-top:8px}
.sec ul{list-style:none;margin-top:10px;display:flex;flex-direction:column;gap:7px}
.sec li{display:flex;gap:10px;font-size:14.5px;color:var(--ink-soft)}
.sec li::before{content:"";flex:none;width:6px;height:6px;border-radius:50%;background:var(--accent);margin-top:8px}
.skills{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}
.skill{font-size:12.5px;color:var(--ink-soft);background:var(--surface-2);border:1px solid var(--line);border-radius:999px;padding:5px 12px}
.salary{display:flex;align-items:center;gap:9px;margin-top:18px;font-size:14px;color:var(--ink-soft)}
.salary svg{width:17px;height:17px;stroke:var(--accent);stroke-width:1.7;fill:none;flex:none}
.full{display:inline-flex;align-items:center;gap:7px;margin-top:20px;font-size:14px;font-weight:500;color:var(--accent-ink);cursor:pointer}
.full svg{width:15px;height:15px;stroke:currentColor;stroke-width:1.8;fill:none}
.full:hover{text-decoration:underline}

/* Swipe stamps */
.stamp{position:absolute;top:80px;font-family:var(--serif);font-size:34px;letter-spacing:.04em;padding:6px 18px;border-radius:12px;border:3px solid;opacity:0;pointer-events:none;transition:opacity .08s}
.stamp.like{right:22px;color:var(--ok);border-color:var(--ok);transform:rotate(14deg)}
.stamp.nope{left:22px;color:var(--no);border-color:var(--no);transform:rotate(-14deg)}

/* Behind cards */
.cardx.behind{transform:scale(.94) translateY(16px);filter:saturate(.96)}
.cardx.behind2{transform:scale(.88) translateY(32px)}

/* Empty state */
.empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px}
.empty .ring{width:88px;height:88px;border-radius:50%;background:var(--accent-soft);display:grid;place-items:center;margin-bottom:22px}
.empty .ring svg{width:40px;height:40px;stroke:var(--accent);stroke-width:2.2;fill:none}
.empty h2{font-size:30px}
.empty p{color:var(--ink-soft);font-size:15.5px;margin-top:12px;max-width:32ch}

/* Controls */
.controls{display:flex;align-items:center;justify-content:center;gap:22px;margin-top:26px}
.ctrl{border-radius:50%;background:var(--surface);border:1.5px solid var(--line-strong);display:grid;place-items:center;cursor:pointer;transition:transform .14s,border-color .18s,background .18s}
.ctrl:active{transform:scale(.92)}
.ctrl svg{stroke-width:2;fill:none}
.ctrl.no{width:66px;height:66px;border-color:color-mix(in srgb,var(--no) 35%,var(--line-strong))}
.ctrl.no svg{width:28px;height:28px;stroke:var(--no)}
.ctrl.no:hover{background:color-mix(in srgb,var(--no) 10%,var(--surface));border-color:var(--no)}
.ctrl.undo{width:50px;height:50px}
.ctrl.undo svg{width:20px;height:20px;stroke:var(--muted)}
.ctrl.undo:hover{border-color:var(--ink-soft)}
.ctrl.undo:disabled{opacity:.4;cursor:not-allowed}
.ctrl.yes{width:66px;height:66px;border-color:color-mix(in srgb,var(--ok) 38%,var(--line-strong))}
.ctrl.yes svg{width:28px;height:28px;stroke:var(--ok)}
.ctrl.yes:hover{background:color-mix(in srgb,var(--ok) 10%,var(--surface));border-color:var(--ok)}

/* Tally */
.tally{display:flex;align-items:center;justify-content:center;gap:18px;margin-top:22px;font-size:14px;color:var(--muted);font-variant-numeric:tabular-nums}
.tally .t{display:inline-flex;align-items:center;gap:7px}
.tally .t svg{width:16px;height:16px;stroke-width:1.9;fill:none}
.tally .t.y svg{stroke:var(--ok)} .tally .t.n svg{stroke:var(--no)}
.tally .t b{font-weight:600;color:var(--ink)}
.tally .sep{width:4px;height:4px;border-radius:50%;background:var(--line-strong)}

/* btn */
.btn{display:inline-flex;align-items:center;gap:.5em;font-family:var(--sans);font-weight:600;font-size:15px;border-radius:999px;padding:14px 26px;cursor:pointer;border:1px solid transparent;background:var(--ink);color:var(--paper);transition:background .2s}
.btn:hover{background:var(--accent);color:#fff}
</style>
</head>
<body>

<div class="topbar">
  <div class="tb-row">
    <a href="FindYourJob - Questionnaire.html" class="home"><span style="font-size:17px;line-height:1">←</span> Refaire le test</a>
    <button class="tgl" id="themeBtn" aria-label="Changer de thème"></button>
  </div>
</div>

<div class="head">
  <h1 class="serif">Tes pistes métiers</h1>
  <p>Glisse à droite si ça t'intéresse, à gauche sinon.</p>
</div>

<div class="stage">
  <div class="deck" id="deck"></div>

  <div class="controls">
    <button class="ctrl no" id="btnNo" aria-label="Passer"><svg viewBox="0 0 24 24"><path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.7a2 2 0 0 0-2 1.7l-1.4 9a2 2 0 0 0 2 2.3H10z"/><path d="M17 2h2.7A2.3 2.3 0 0 1 22 4.3v6.4A2.3 2.3 0 0 1 19.7 13H17"/></svg></button>
    <button class="ctrl undo" id="btnUndo" aria-label="Annuler" disabled><svg viewBox="0 0 24 24"><path d="M9 14 4 9l5-5"/><path d="M4 9h11a5 5 0 0 1 5 5v0a5 5 0 0 1-5 5H9"/></svg></button>
    <button class="ctrl yes" id="btnYes" aria-label="J'aime"><svg viewBox="0 0 24 24"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.3a2 2 0 0 0 2-1.7l1.4-9a2 2 0 0 0-2-2.3H14z"/><path d="M7 22H4.3A2.3 2.3 0 0 1 2 19.7v-6.4A2.3 2.3 0 0 1 4.3 11H7"/></svg></button>
  </div>

  <div class="tally" id="tally"></div>
</div>

<script>
(function(){
  var html=document.documentElement;
  /* theme */
  var tbtn=document.getElementById('themeBtn');
  var moon='<svg viewBox="0 0 24 24"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg>';
  var sun='<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>';
  function applyMode(m){ html.setAttribute('data-mode',m); tbtn.innerHTML=m==='dark'?sun:moon; try{localStorage.setItem('fyj-mode',m);}catch(e){} }
  var sm='light'; try{ sm=localStorage.getItem('fyj-mode')||'light'; }catch(e){}
  applyMode(sm);
  tbtn.addEventListener('click',function(){ applyMode(html.getAttribute('data-mode')==='dark'?'light':'dark'); });

  /* data */
  var JOBS=[
    {score:92,title:"Développeur·se full-stack",tagline:"Conçoit des applications web de bout en bout, du serveur à l'interface.",
     desc:"Développe et maintient des applications numériques : côté serveur (API, bases de données) comme côté interface (web, mobile). Travaille généralement en équipe dans une entreprise tech ou en agence.",
     why:"Ton goût pour résoudre des problèmes concrets et ton autonomie collent à un métier où l'on construit des produits du début à la fin.",
     missions:["Développer les interfaces et la logique serveur","Concevoir des bases de données et des API","Corriger les bugs et améliorer les performances"],
     skills:["JavaScript","React","SQL","Git","Résolution de problèmes"],salary:"35–55 k€ brut/an en début de carrière"},
    {score:89,title:"UX / Product Designer",tagline:"Conçoit des produits numériques centrés sur leurs utilisateurs.",
     desc:"Imagine et teste des parcours, des interfaces et des fonctionnalités. Fait le pont entre les besoins des utilisateurs, la technique et les objectifs de l'entreprise.",
     why:"Ton équilibre entre créativité et logique, et ton envie d'impact concret, sont au cœur du métier de designer produit.",
     missions:["Mener des entretiens et tests utilisateurs","Concevoir maquettes et prototypes","Collaborer avec les équipes dev et produit"],
     skills:["Figma","Recherche utilisateur","Prototypage","Empathie"],salary:"34–50 k€ brut/an en début de carrière"},
    {score:84,title:"Chef·fe de projet digital",tagline:"Coordonne les équipes et les délais pour livrer des projets numériques.",
     desc:"Planifie, organise et suit l'avancement de projets web ou applicatifs. Fait le lien entre le client, les équipes techniques et la direction.",
     why:"Ton envie d'organiser et de faire avancer les choses, avec de l'autonomie et du travail d'équipe, correspond à ce rôle pivot.",
     missions:["Cadrer les besoins et le périmètre","Piloter le planning et le budget","Animer les équipes et les points clients"],
     skills:["Gestion de projet","Communication","Agilité","Organisation"],salary:"32–48 k€ brut/an en début de carrière"},
    {score:81,title:"Data Analyst",tagline:"Transforme les données en décisions concrètes.",
     desc:"Collecte, nettoie et analyse des jeux de données pour répondre à des questions métier. Conçoit des tableaux de bord et présente ses conclusions.",
     why:"Ton sens de la logique et de l'analyse, et ton goût pour résoudre des problèmes, sont la base de ce métier.",
     missions:["Explorer et nettoyer les données","Construire des indicateurs et tableaux de bord","Présenter des recommandations claires"],
     skills:["SQL","Python","Statistiques","Visualisation"],salary:"34–46 k€ brut/an en début de carrière"},
    {score:77,title:"Designer graphique",tagline:"Donne forme aux messages visuels d'une marque.",
     desc:"Crée des supports visuels — identité, web, print, réseaux sociaux — qui portent le message d'une marque ou d'un produit.",
     why:"Ton appétence créative et ton envie de produire des choses concrètes et visibles trouvent ici un terrain d'expression.",
     missions:["Décliner une identité visuelle","Créer des supports print et digitaux","Respecter une charte et des délais"],
     skills:["Illustrator","Photoshop","Typographie","Créativité"],salary:"28–40 k€ brut/an en début de carrière"},
    {score:73,title:"Responsable communication",tagline:"Porte la voix d'une organisation vers ses publics.",
     desc:"Définit et déploie la stratégie de communication : contenus, relations presse, réseaux sociaux, événements. Coordonne prestataires et équipes internes.",
     why:"Ton aisance relationnelle et ton goût pour coordonner et donner du sens collent à ce rôle de chef d'orchestre.",
     missions:["Définir le plan de communication","Produire et piloter les contenus","Mesurer l'impact des actions"],
     skills:["Rédaction","Réseaux sociaux","Stratégie","Coordination"],salary:"30–44 k€ brut/an en début de carrière"}
  ];

  var deck=document.getElementById('deck');
  var tally=document.getElementById('tally');
  var btnNo=document.getElementById('btnNo'),btnYes=document.getElementById('btnYes'),btnUndo=document.getElementById('btnUndo');

  var idx=0, likes=0, passes=0, history=[];

  function renderTally(){
    var rest=JOBS.length-idx;
    tally.innerHTML=
      '<span class="t y"><svg viewBox="0 0 24 24"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.3a2 2 0 0 0 2-1.7l1.4-9a2 2 0 0 0-2-2.3H14z"/></svg><b>'+likes+'</b> j\'aime</span>'+
      '<span class="sep"></span>'+
      '<span class="t n"><svg viewBox="0 0 24 24"><path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.7a2 2 0 0 0-2 1.7l-1.4 9a2 2 0 0 0 2 2.3H10z"/></svg><b>'+passes+'</b> passés</span>'+
      '<span class="sep"></span>'+
      '<span class="t">'+Math.min(idx,JOBS.length)+'/'+JOBS.length+'</span>';
  }

  function cardHTML(j,n){
    return '<div class="band"><span class="pn">Piste #'+n+'</span><span class="pct">'+j.score+'% d\'adéquation</span></div>'+
      '<div class="cbody">'+
        '<h2 class="serif">'+j.title+'</h2>'+
        '<p class="tagline">'+j.tagline+'</p>'+
        '<p class="desc">'+j.desc+'</p>'+
        '<div class="sec"><div class="lab">Pourquoi ce métier te correspond</div><p class="why">'+j.why+'</p></div>'+
        '<div class="sec"><div class="lab">Missions clés</div><ul>'+j.missions.map(function(m){return '<li>'+m+'</li>';}).join('')+'</ul></div>'+
        '<div class="sec"><div class="lab">Compétences</div><div class="skills">'+j.skills.map(function(s){return '<span class="skill">'+s+'</span>';}).join('')+'</div></div>'+
        '<div class="salary"><svg viewBox="0 0 24 24"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M12 2a7 7 0 0 0-4 12.7c.6.5 1 1.3 1 2.1V18h6v-1.2c0-.8.4-1.6 1-2.1A7 7 0 0 0 12 2Z"/></svg>'+j.salary+'</div>'+
        '<div class="full" data-full="1"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 11v5"/><path d="M12 8h.01"/></svg> Voir la fiche complète</div>'+
      '</div>'+
      '<div class="stamp like">J\'aime</div><div class="stamp nope">Passe</div>';
  }

  function buildDeck(){
    deck.innerHTML='';
    if(idx>=JOBS.length){
      var e=document.createElement('div');
      e.className='empty';
      e.innerHTML='<div class="ring"><svg viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg></div>'+
        '<h2 class="serif">Tu as parcouru tes '+JOBS.length+' pistes.</h2>'+
        '<p>Tu as retenu <b>'+likes+'</b> métier'+(likes>1?'s':'')+'. On te prépare une sélection détaillée avec, pour chacun, une fiche complète et les premières étapes à suivre.</p>'+
        '<button class="btn" style="margin-top:26px" id="seeSel">Voir ma sélection →</button>';
      deck.appendChild(e);
      var ss=e.querySelector('#seeSel');
      if(ss) ss.addEventListener('click',function(){ alert('→ '+likes+' fiche(s) métier retenue(s).'); });
      renderTally(); updateUndo();
      return;
    }
    /* render up to 3 cards, top last */
    for(var k=Math.min(idx+2,JOBS.length-1); k>=idx; k--){
      var el=document.createElement('div');
      el.className='cardx'+(k===idx?'':(k===idx+1?' behind':' behind2'));
      el.innerHTML=cardHTML(JOBS[k],k+1);
      deck.appendChild(el);
      if(k===idx) attachDrag(el);
      el.querySelectorAll('[data-full]').forEach(function(f){
        f.addEventListener('click',function(ev){ ev.stopPropagation(); window.location.href='FindYourJob - Fiche metier.html'; });
        f.addEventListener('pointerdown',function(ev){ ev.stopPropagation(); });
      });
    }
    renderTally(); updateUndo();
  }

  function updateUndo(){ btnUndo.disabled=history.length===0; }

  function commit(dir,fromBtn){
    if(idx>=JOBS.length) return;
    var top=deck.querySelector('.cardx:last-child');
    if(!top) return;
    history.push({idx:idx,dir:dir});
    if(dir==='like') likes++; else passes++;
    var dx=(dir==='like'?1:-1)*(window.innerWidth);
    top.style.transition='transform .42s cubic-bezier(.4,0,.2,1)';
    top.style.transform='translate('+dx+'px,40px) rotate('+(dir==='like'?22:-22)+'deg)';
    idx++;
    setTimeout(buildDeck,300);
  }

  function undo(){
    if(history.length===0) return;
    var last=history.pop();
    if(last.dir==='like') likes--; else passes--;
    idx=last.idx;
    buildDeck();
    var top=deck.querySelector('.cardx:last-child');
    if(top){
      top.style.transition='none';
      top.style.transform='translate('+((last.dir==='like'?1:-1)*window.innerWidth)+'px,40px) rotate('+(last.dir==='like'?22:-22)+'deg)';
      requestAnimationFrame(function(){ top.style.transition='transform .42s cubic-bezier(.4,0,.2,1)'; top.style.transform=''; });
    }
  }

  function attachDrag(el){
    var sx=0,sy=0,dx=0,dy=0,drag=false;
    var like=el.querySelector('.stamp.like'),nope=el.querySelector('.stamp.nope');
    var body=el.querySelector('.cbody');
    function down(e){
      if(e.target.closest('.cbody') && e.target.closest('.full')){} /* allow */
      drag=true; var p=point(e); sx=p.x; sy=p.y; el.style.transition='none';
    }
    function move(e){
      if(!drag) return;
      var p=point(e); dx=p.x-sx; dy=p.y-sy;
      /* let vertical scroll inside body win if mostly vertical & small horizontal */
      if(Math.abs(dy)>Math.abs(dx) && Math.abs(dx)<12){ return; }
      if(e.cancelable) e.preventDefault();
      el.style.transform='translate('+dx+'px,'+dy*.4+'px) rotate('+dx*.05+'deg)';
      var r=Math.min(Math.abs(dx)/120,1);
      like.style.opacity=dx>0?r:0; nope.style.opacity=dx<0?r:0;
    }
    function up(){
      if(!drag) return; drag=false;
      el.style.transition='transform .3s ease';
      if(Math.abs(dx)>110){ commit(dx>0?'like':'nope'); }
      else { el.style.transform=''; like.style.opacity=0; nope.style.opacity=0; }
      dx=0;dy=0;
    }
    el.addEventListener('pointerdown',function(e){ down(e); });
    window.addEventListener('pointermove',move,{passive:false});
    window.addEventListener('pointerup',up);
    el.__cleanup=function(){ window.removeEventListener('pointermove',move); window.removeEventListener('pointerup',up); };
  }

  function point(e){ return {x:e.clientX,y:e.clientY}; }

  btnNo.addEventListener('click',function(){ commit('nope',true); });
  btnYes.addEventListener('click',function(){ commit('like',true); });
  btnUndo.addEventListener('click',undo);
  document.addEventListener('keydown',function(e){
    if(e.key==='ArrowLeft') commit('nope');
    else if(e.key==='ArrowRight') commit('like');
    else if(e.key==='Backspace'){ e.preventDefault(); undo(); }
  });

  buildDeck();
})();
</script>
</body>
</html>
